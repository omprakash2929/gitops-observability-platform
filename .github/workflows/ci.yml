name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: 0

  validate-manifests:
    name: ✅ Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Validate manifests
        run: |
          kubectl apply \
            --dry-run=client \
            --validate=false \
            -f apps/hipster-shop/kubernetes-manifests.yaml
          echo "✅ Manifests valid!"

  validate-helm:
    name: 🎯 Validate Helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Helm lint check
        run: |
          if [ -d "helm" ] && [ "$(ls -A helm)" ]; then
            for chart in helm/*/; do
              echo "Linting $chart..."
              helm lint "$chart"
            done
            echo "✅ Helm charts valid!"
          else
            echo "⚠️ No Helm charts found — skipping"
            exit 0
          fi

  notify:
    name: 🔔 Notify
    runs-on: ubuntu-latest
    needs: [security-scan, validate-manifests, validate-helm]
    if: always()
    steps:
      - name: Pipeline Status
        run: |
          echo "================================"
          echo "✅ CI Pipeline Complete!"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Author : ${{ github.actor }}"
          echo "================================"
